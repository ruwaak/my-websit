
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Feedback  -  TUWAIQ AIRPORT</title>
    <link rel="stylesheet" href="Orobac.css">
</head>
<body>
    <div class="container">
         <div class="main-box">

            <div class="left-side">
                

            <h1>Thank you for Visiting</h1>
        
            <p>We appreciate your time at TUWAIQ AIRPORT</p>
            <p>shere your feedback to help us improve </p>
            <P>Thank you for choosing TUWAIQ AIRPORT</P>
        
            </div>

            

            <div class="right-side">
                <h2>Feedback & Suggestions</h2>
            <form action="Thanks.html">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="flight">Flight Number</label>
                <input type="text" id="flight" name="flight" required>

                <label for="feedback">Feedback</label>
                <textarea id="feedback" name="feedback" required> </textarea>

                <label for="suggestions">Suggestions</label>
                <textarea id="suggestions" name="suggestions"></textarea>

                <button type="submit">Submit</button>
            </form>
         </div>

    </div>
</body>
</html>
